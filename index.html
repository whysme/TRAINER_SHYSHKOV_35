        b.innerText = t;
        b.onclick = () => check(b, idx);
        a.appendChild(b);
    });
}

function check(btn, idx) {
    const q = data[i];
    const buttons = document.querySelectorAll('button');
    q.c.forEach((c, j) => {
        if (c) buttons[j].classList.add('correct');
    });
    if (!q.c[idx]) btn.classList.add('wrong');
}

    load();
}
