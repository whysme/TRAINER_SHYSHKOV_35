<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Тренажёр</title>
<style>
:root {
  --bg:#0f1115; --card:#181b22; --muted:#9aa3b2; --text:#f5f7fb;
  --line:#2a2f3a; --accent:#4f8cff; --ok:#1f9d55; --bad:#e5484d; --pick:#2b3a55;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
.app { max-width:760px; margin:0 auto; padding:18px 14px 32px; }
.top {
  position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 82%,transparent);
  padding:12px 0 14px; z-index:5;
}
.title { font-size:24px; font-weight:800; margin:0 0 10px; }
.meta { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:14px; margin-bottom:10px; flex-wrap:wrap; }
.bar { height:10px; background:#252a34; border-radius:99px; overflow:hidden; }
.bar>div { height:100%; width:0; background:var(--accent); transition:.25s; }
.card {
  background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.22);
}
.cat { color:var(--muted); font-size:13px; margin-bottom:10px; }
.q { font-size:20px; font-weight:750; line-height:1.35; margin-bottom:16px; }
.hint { color:var(--muted); font-size:14px; margin-bottom:12px; }
.ans { display:flex; flex-direction:column; gap:10px; }
.ans button {
  text-align:left; border:1px solid var(--line); background:#11141a; color:var(--text);
  border-radius:14px; padding:14px; font-size:16px; line-height:1.25;
}
.ans button.sel { background:var(--pick); border-color:#5b77ad; }
.ans button.ok { background:rgba(31,157,85,.26); border-color:var(--ok); }
.ans button.bad { background:rgba(229,72,77,.26); border-color:var(--bad); }
.result { min-height:24px; margin:14px 0; color:var(--muted); font-weight:750; }
.result.good { color:#52d273; }
.result.bad { color:#ff777b; }
.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:12px; }
.ctl {
  border:0; border-radius:14px; padding:14px 10px; background:#252b36;
  color:var(--text); font-size:15px; font-weight:750;
}
.primary { background:var(--accent); }
.danger { background:#713034; }
.ctl:disabled { opacity:.45; }
.small { font-size:13px; color:var(--muted); margin-top:12px; line-height:1.35; }
select {
  width:100%; margin:0 0 14px; border-radius:14px; padding:12px;
  background:#11141a; color:var(--text); border:1px solid var(--line); font-size:15px;
}
@media(max-width:430px) {
  .q { font-size:18px; }
  .grid { grid-template-columns:1fr; }
  .ctl { font-size:14px; }
  .app { padding-left:12px; padding-right:12px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1 class="title">Тренажёр</h1>
    <div class="meta"><span id="counter"></span><span id="score"></span></div>
    <div class="bar"><div id="bar"></div></div>
  </div>

  <select id="categoryFilter" onchange="applyFilter()"></select>

  <div class="card">
    <div id="cat" class="cat"></div>
    <div id="q" class="q"></div>
    <div id="hint" class="hint"></div>
    <div id="ans" class="ans"></div>
    <div id="result" class="result"></div>

    <button class="ctl primary" id="checkBtn" onclick="check()">Показать правильный ответ / Проверить</button>

    <div class="grid">
      <button class="ctl" onclick="prev()">← Назад</button>
      <button class="ctl" onclick="next()">Далее →</button>
      <button class="ctl danger" onclick="restart()">С начала</button>
    </div>

    <div class="small">Если правильных ответов несколько — выбери все нужные варианты, потом нажми проверку.</div>
  </div>
</div>

let questions = [...ALL_QUESTIONS];
let current = 0;
let selected = {};
let checked = {};
let correctCount = 0;

function same(a,b) {
  return a.length === b.length && a.every(x => b.includes(x));
}

function fillCategories() {
  const select = document.getElementById('categoryFilter');
  const cats = [...new Set(ALL_QUESTIONS.map(q => q.cat))];
  select.innerHTML = '<option value="__all">Все темы (' + ALL_QUESTIONS.length + ')</option>';
  cats.forEach(cat => {
    const count = ALL_QUESTIONS.filter(q => q.cat === cat).length;
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat + ' (' + count + ')';
    select.appendChild(opt);
  });
}

function applyFilter() {
  const val = document.getElementById('categoryFilter').value;
  questions = val === '__all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.cat === val);
  current = 0;
  selected = {};
  checked = {};
  correctCount = 0;
  render();
}

function render() {
  const item = questions[current];
  const user = selected[current] || [];
  const isChecked = !!checked[current];

  document.getElementById('counter').textContent = `Вопрос ${current + 1} из ${questions.length}`;
  document.getElementById('score').textContent = `Верно: ${correctCount}`;
  document.getElementById('bar').style.width = ((current + 1) / questions.length * 100) + '%';
  document.getElementById('cat').textContent = item.cat;
  document.getElementById('q').textContent = item.q;
  document.getElementById('hint').textContent = item.c.length > 1 ? 'Можно выбрать несколько ответов' : 'Выбери один ответ';

  const box = document.getElementById('ans');
  box.innerHTML = '';

  item.a.forEach((txt, i) => {
    const b = document.createElement('button');
    b.textContent = txt;

    if (user.includes(i)) b.classList.add('sel');

    if (isChecked) {
      if (item.c.includes(i)) b.classList.add('ok');
      if (user.includes(i) && !item.c.includes(i)) b.classList.add('bad');
    }

    b.onclick = () => toggle(i);
    box.appendChild(b);
  });

  const r = document.getElementById('result');
  if (isChecked) {
    const ok = same((selected[current] || []).slice().sort((a,b)=>a-b), item.c.slice().sort((a,b)=>a-b));
    r.textContent = ok ? 'Правильно' : 'Неправильно. Зелёным отмечен правильный ответ.';
    r.className = 'result ' + (ok ? 'good' : 'bad');
  } else {
    r.textContent = '';
    r.className = 'result';
  }

  document.getElementById('checkBtn').disabled = isChecked;
}

function toggle(i) {
  if (checked[current]) return;

  const item = questions[current];
  let arr = selected[current] ? [...selected[current]] : [];

  if (item.c.length === 1) {
    arr = [i];
  } else {
    arr = arr.includes(i) ? arr.filter(x => x !== i) : [...arr, i];
  }

  selected[current] = arr;
  render();
}

function check() {
  if (checked[current]) return;

  const user = (selected[current] || []).slice().sort((a,b)=>a-b);
  const cor = questions[current].c.slice().sort((a,b)=>a-b);

  checked[current] = true;
  if (same(user, cor)) correctCount++;

  render();
}

function next() {
  if (current < questions.length - 1) {
    current++;
    render();
  }
}

function prev() {
  if (current > 0) {
    current--;
    render();
  }
}

function restart() {
  if (confirm('Начать заново?')) {
    current = 0;
    selected = {};
    checked = {};
    correctCount = 0;
    render();
  }
}

fillCategories();
render();
