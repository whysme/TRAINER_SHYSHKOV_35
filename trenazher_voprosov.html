<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Тренажёр вопросов</title>
  <style>
    :root { --bg:#f6f7fb; --card:#fff; --text:#172033; --muted:#64748b; --accent:#2563eb; --good:#16a34a; --bad:#dc2626; --line:#e5e7eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:920px; margin:0 auto; padding:24px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:16px; }
    h1 { margin:0; font-size:28px; }
    .muted { color:var(--muted); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px; box-shadow:0 10px 30px rgba(15,23,42,.06); }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
    .stat { background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px; text-align:center; }
    .stat b { display:block; font-size:22px; }
    .bar { height:10px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:12px 0 20px; }
    .bar > div { height:100%; width:0%; background:var(--accent); transition:.25s; }
    .q { font-size:21px; line-height:1.35; margin:8px 0 18px; }
    .answers { display:grid; gap:10px; }
    label.answer { display:flex; gap:10px; align-items:flex-start; padding:13px 14px; border:1px solid var(--line); border-radius:14px; cursor:pointer; background:#fff; }
    label.answer:hover { border-color:#93c5fd; }
    label.answer.correct { border-color:var(--good); background:#ecfdf5; }
    label.answer.wrong { border-color:var(--bad); background:#fef2f2; }
    input { margin-top:3px; transform:scale(1.15); }
    .buttons { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    button, select { border:1px solid var(--line); border-radius:12px; padding:11px 14px; background:#fff; color:var(--text); font-weight:650; cursor:pointer; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.good { background:var(--good); color:#fff; border-color:var(--good); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .result { margin-top:14px; padding:12px 14px; border-radius:14px; display:none; }
    .result.ok { display:block; background:#ecfdf5; color:#166534; border:1px solid #bbf7d0; }
    .result.no { display:block; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .mode { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .footer { margin-top:14px; font-size:13px; color:var(--muted); }
    @media (max-width:720px){ .top{display:block}.stats{grid-template-columns:repeat(2,1fr)} .wrap{padding:14px} .q{font-size:18px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Тренажёр вопросов</h1>
        <div class="muted">Вопросы загружены из файла .tst</div>
      </div>
      <div class="mode">
        <select id="mode">
          <option value="all">Все вопросы</option>
          <option value="mistakes">Только ошибки</option>
          <option value="random">Случайный порядок</option>
        </select>
        <button id="restart">Начать заново</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><b id="num">0</b><span>вопрос</span></div>
      <div class="stat"><b id="total">0</b><span>всего</span></div>
      <div class="stat"><b id="score">0</b><span>верно</span></div>
      <div class="stat"><b id="percent">0%</b><span>результат</span></div>
    </div>

    <div class="bar"><div id="progress"></div></div>

    <div class="card">
      <div class="muted" id="hint">Выберите все правильные варианты ответа.</div>
      <div class="q" id="question"></div>
      <div class="answers" id="answers"></div>
      <div class="result" id="result"></div>
      <div class="buttons">
        <button class="primary" id="check">Проверить</button>
        <button id="show">Показать ответ</button>
        <button class="good" id="next">Следующий</button>
      </div>
    </div>
    <div class="footer">Подсказка: в некоторых вопросах правильных вариантов несколько.</div>
  </div>

<script>
const QUESTIONS = [{"question": "Укажите действительный размер, соответствующий годному отверстию, если на чертеже проставлено диаметр 50U8:", "answers": [{"text": "50,000 мм", "correct": false}, {"text": "49,891 мм", "correct": true}, {"text": "49,940 мм", "correct": false}, {"text": "50,070 мм", "correct": false}, {"text": "49,920 мм", "correct": true}]}, {"question": "Укажите действительный размер, соответствующий годному валу, если на чертеже проставлено диаметр 20p6:", "answers": [{"text": "20,000 мм", "correct": false}, {"text": "20,020 мм", "correct": false}, {"text": "20,025 мм", "correct": true}, {"text": "20,030 мм", "correct": true}, {"text": "20,035 мм", "correct": true}, {"text": "20,040 мм", "correct": false}]}, {"question": "Укажите годный вал, если на чертеже проставлено диаметр 40f7, а в результате измерения получены следующие значения действительного размера:", "answers": [{"text": "40,000 мм", "correct": false}, {"text": "39,980 мм", "correct": false}, {"text": "39,970 мм", "correct": true}, {"text": "39,960 мм", "correct": true}, {"text": "39,950 мм", "correct": true}, {"text": "39,920 мм", "correct": false}]}, {"question": "Какие значения действительного размера относятся к группе исправимого брака, если в результате измерения вала диаметром 60f7 были получены следующие данные:", "answers": [{"text": "60,000 мм", "correct": true}, {"text": "59,990 мм", "correct": true}, {"text": "59,980 мм", "correct": true}, {"text": "59,970 мм", "correct": false}, {"text": "59,950 мм", "correct": false}, {"text": "59,940 мм", "correct": false}]}, {"question": "Укажите размеры отверстий, относящиеся к группе неисправимого брака, если на чертеже проставлено диаметр 60F7: ", "answers": [{"text": "60,100 мм", "correct": true}, {"text": "60,080 мм", "correct": true}, {"text": "60,070 мм", "correct": true}, {"text": "60,060 мм", "correct": false}, {"text": "60,050 мм", "correct": false}, {"text": "60,030 мм", "correct": false}]}, {"question": "Задана посадка с зазор ,053 мм", "correct": false}, {"text": "ES = + 0,005 мм", "correct": true}, {"text": "ES = - 0,053 мм", "correct": false}]}, {"question": "Номинальный размер вала равен 140 мм, верхнее предельное отклонение равно 0 мм, нижнее предельное отклонение равно - 0,040 мм, тогда допуск размера равен ...", "answers": [{"text": "140,000 мм", "correct": false}, {"text": "139,960 мм", "correct": false}, {"text": "0,040 мм", "correct": true}, {"text": "- 0,040 мм", "correct": false}]}, {"question": "Для посадки 100H8/s7 определите предельные натяги ...", "answers": [{"text": "Nmax = 0,106 мм; Nmin = 0,054 мм", "correct": false}, {"text": "Nmax = 100,054 мм; Nmin = 100,000 мм", "correct": false}, {"text": "Nmax = 0,106 мм; Nmin = 0,017 мм", "correct": true}, {"text": "Nmax = 100,106 мм; Nmin = 100,071 мм", "correct": false}]}, {"question": "Размер на чертеже обозначен 20 f7, определите наименьший предельный размер вала:", "answers": [{"text": "dmin = 19,020 мм", "correct": false}, {"text": "dmin = 19,041 мм", "correct": false}, {"text": "dmin = 19,959 мм", "correct": true}, {"text": "dmin = 19,980 мм", "correct": false}]}, {"question": "Размер на чертеже обозначен 60H8, определите его предельные размеры:", "answers": [{"text": "dmax = 60,046 мм; dmin = 60,000 мм", "correct": false}, {"text": "Dmax = 60,046 мм; Dmin = 60,000 мм", "correct": true}, {"text": "Dmax = 60,000 мм; Dmin = 59,954 мм", "correct": false}, {"text": "dmax = 60,000 мм; dmin = 59,954 мм", "correct": false}]}, {"question": "При обработке вала задан номинальный размер dn = 100 мм. Верхнее предельное отклонение es = + 0,012 мм, допуск T = 0,020 мм, чему равно нижнее предельное отклонение ei:", "answers": [{"text": "ei = - 0,032 мм", "correct": false}, {"text": "ei = - 0,008 мм", "correct": true}, {"text": "ei = + 0,008 мм", "correct": false}, {"text": "ei = + 0,032 мм", "correct": false}]}, {"question": "Для контроля размеров валов применяют ...", "answers": [{"text": "калибры-пробки", "correct": false}, {"text": " let order = [];
let index = 0;
let correctCount = 0;
let answeredCount = 0;
let mistakes = new Set(JSON.parse(localStorage.getItem('quizMistakes') || '[]'));
let checked = false;

const el = id => document.getElementById(id);

function shuffle(a){
  a = [...a];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildOrder(){
  const mode = el('mode').value;
  if(mode === 'mistakes') order = [...mistakes].filter(i => QUESTIONS[i]);
  else order = QUESTIONS.map((_, i) => i);
  if(mode === 'random') order = shuffle(order);
  if(order.length === 0) order = QUESTIONS.map((_, i) => i);
  index = 0; correctCount = 0; answeredCount = 0; checked = false;
  render();
}

function render(){
  const total = order.length;
  if(index >= total){
    el('question').textContent = `Готово! Результат: ${correctCount} из ${answeredCount}.`;
    el('answers').innerHTML = '';
    el('result').className = 'result ok';
    el('result').textContent = mistakes.size ? `Ошибок для повторения: ${mistakes.size}.` : 'Ошибок нет. Отлично!';
    el('check').disabled = true; el('show').disabled = true; el('next').disabled = true;
    updateStats();
    return;
  }
  checked = false;
  const q = QUESTIONS[order[index]];
  el('question').textContent = q.question;
  el('answers').innerHTML = '';
  const type = q.answers.filter(a => a.correct).length > 1 ? 'checkbox' : 'radio';
  el('hint').textContent = type === 'checkbox' ? 'Выберите все правильные варианты ответа.' : 'Выберите один правильный ответ.';
  q.answers.forEach((a, i) => {
    const label = document.createElement('label');
    label.className = 'answer';
    label.innerHTML = `<input name="answer" type="${type}" value="${i}"><span>${escapeHtml(a.text)}</span>`;
    el('answers').appendChild(label);
  });
  el('result').className = 'result';
  el('result').textContent = '';
  el('check').disabled = false; el('show').disabled = false; el('next').disabled = false;
  updateStats();
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

function selected(){
  return [...document.querySelectorAll('input[name="answer"]:checked')].map(i => Number(i.value));
}

function check(showOnly=false){
  const qIndex = order[index], q = QUESTIONS[qIndex];
  const sel = selected();
  if(!showOnly && sel.length === 0){ alert('Сначала выберите ответ.'); return; }
  const correct = q.answers.map((a,i)=>a.correct?i:null).filter(i=>i!==null);
  const isOk = sel.length === correct.length && sel.every(i => correct.includes(i));
  [...document.querySelectorAll('label.answer')].forEach((label, i) => {
    label.classList.toggle('correct', q.answers[i].correct);
    label.classList.toggle('wrong', !q.answers[i].correct && sel.includes(i));
    label.querySelector('input').disabled = true;
  });
  if(!checked && !showOnly){
    answeredCount++;
    if(isOk){ correctCount++; mistakes.delete(qIndex); }
    else mistakes.add(qIndex);
    localStorage.setItem('quizMistakes', JSON.stringify([...mistakes]));
    checked = true;
  }
  el('result').className = 'result ' + (isOk || showOnly ? 'ok' : 'no');
  el('result').textContent = showOnly ? 'Правильные варианты подсвечены зелёным.' : (isOk ? 'Верно!' : 'Неверно. Правильные варианты подсвечены зелёным.');
  updateStats();
}

function updateStats(){
  const total = order.length || QUESTIONS.length;
  el('num').textContent = Math.min(index+1, total);
  el('total').textContent = total;
  el('score').textContent = correctCount;
  el('percent').textContent = answeredCount ? Math.round(correctCount/answeredCount*100)+'%' : '0%';
  el('progress').style.width = total ? (Math.min(index,total)/total*100)+'%' : '0%';
}

el('check').onclick = () => check(false);
el('show').onclick = () => check(true);
el('next').onclick = () => { index++; render(); };
el('restart').onclick = buildOrder;
el('mode').onchange = buildOrder;
buildOrder();
</script>
